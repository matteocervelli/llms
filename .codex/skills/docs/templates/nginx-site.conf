# nginx config per {{APP_NAME}}
# Sostituisci {{DOMAIN}} e {{APP_NAME}} con i valori reali
# Deploy path: /opt/{{APP_NAME}}/site/dist/

server {
    listen 80;
    server_name {{DOMAIN}};
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name {{DOMAIN}};

    ssl_certificate /etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{DOMAIN}}/privkey.pem;

    root /opt/{{APP_NAME}}/site/dist;

    # Marketing/landing pages — pubbliche
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Docs — protette da auth finché l'app non è pubblica
    # RIMUOVI il blocco auth_request quando l'app va pubblica
    location /docs {
        auth_request /api/auth/verify;
        auth_request_set $auth_status $upstream_status;

        # Se 401: redirect al login dell'app
        error_page 401 = @docs_login_redirect;

        try_files $uri $uri/ /docs/index.html;
    }

    # Endpoint interno per validazione auth → FastAPI
    location = /api/auth/verify {
        internal;
        proxy_pass http://localhost:8000;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
    }

    # Redirect al login se non autenticato
    location @docs_login_redirect {
        return 302 /login?next=/docs;
    }

    # Proxy verso FastAPI backend
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
